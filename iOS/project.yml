name: Batchwick
options:
  bundleIdPrefix: com.shimondeitel.diffuserlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Batchwick:
    type: application
    platform: iOS
    sources:
      - path: Batchwick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.diffuserlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Batchwick/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchwickTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchwickTests
      - path: Batchwick.storekit
    dependencies:
      - target: Batchwick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.diffuserlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchwickUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchwickUITests
    dependencies:
      - target: Batchwick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.diffuserlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Batchwick:
    build:
      targets:
        Batchwick: all
        BatchwickTests: [test]
        BatchwickUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Batchwick.storekit
    test:
      config: Debug
      storeKitConfiguration: Batchwick.storekit
      targets:
        - BatchwickTests
        - BatchwickUITests
    archive:
      config: Release
